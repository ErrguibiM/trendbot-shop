name: TrendBot Daily Update Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  update-products:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Agent Script ausführen
        run: node scripts/update-products.js

      - name: Änderungen committen
        run: |
          git config --local user.email "trendbot@auto.de"
          git config --local user.name "TrendBot Agent"
          git add -A
          git diff --cached --quiet || git commit -m "🤖 TrendBot Auto-Update"
          git push
