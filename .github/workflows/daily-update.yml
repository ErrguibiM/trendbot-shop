name: TrendBot Daily Update Agent

on:
  schedule:
    - cron: '0 7 * * *'  # Jeden Tag um 08:00 Uhr deutscher Zeit
  workflow_dispatch:       # Auch manuell startbar

jobs:
  update-products:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Agent Script ausführen
        run: node scripts/update-products.js

      - name: Änderungen committen
        run: |
          git config --local user.email "trendbot@auto.de"
          git config --local user.name "TrendBot Agent"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 TrendBot Auto-Update $(date '+%d.%m.%Y')"
          git push
